<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>알림 설정</title>
  <style>
    body {
      background: linear-gradient(135deg, #98cebc5e, #ACB6E5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
    }

    .notification-form {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
    }

    .form-title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 24px;
    }

    .allim-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .allim-switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
    }

    .allim-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    .allim-switch input:checked + .slider {
      background-color: #6e67cf;
    }

    .allim-switch input:checked + .slider:before {
      transform: translateX(22px);
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-cancel {
      background-color: #ccc;
      color: #333;
    }

    .btn-save {
      background-color: #6e67cf;
      color: white;
    }

    .btn-save:hover {
      background-color: #8cd875;
    }

    .btn-guardian {
  background-color: #aeb1b0;
  color: white;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  padding: 12px;
  border-radius: 8px;
  font-size: 16px;
  transition: background 0.3s;
}

.btn-guardian:hover {
  background-color: #73d16f;
}
  </style>
</head>
<body>

<form action="#" method="post" class="notification-form">
  <h2 class="form-title">알림 설정</h2>

  <div class="allim-group">
    <label for="allNotifications">전체 알림</label>
    <label class="allim-switch">
      <input type="checkbox" id="allNotifications" onclick="allimAll(this)">
      <span class="slider"></span>
    </label>
  </div>

  <div class="allim-group">
    <label for="dangerZoneAlert">위험 지역 진입 시 알림</label>
    <label class="allim-switch">
      <input type="checkbox" id="dangerZoneAlert">
      <span class="slider"></span>
    </label>
  </div>

  <div class="allim-group">
    <label for="facilityAlert">안전 시설 접근 시 안내</label>
    <label class="allim-switch">
      <input type="checkbox" id="facilityAlert">
      <span class="slider"></span>
    </label>
  </div>

  <div class="allim-group">
    <label for="deviationAlert">경로 이탈 시 경고</label>
    <label class="allim-switch">
      <input type="checkbox" id="deviationAlert">
      <span class="slider"></span>
    </label>
  </div>

  <div class="allim-group">
    <label for="emergencyAlert">긴급상황 시 보호자에게 알림 전송</label>
    <label class="allim-switch">
      <input type="checkbox" id="emergencyAlert">
      <span class="slider"></span>
    </label>
  </div>

  <div class="button-group">
    <a href="회원가입 화면.html" class="btn btn-guardian">이전으로</a>
    <button type="submit" class="btn btn-save">저장하기</button>
  </div>
</form>


<!--전체 알림을 눌렀을 때 밑에 알림들도 다 ON이 되게 만들기-->

<script>
  function allimAll(master) {
    const targets = [
      'dangerZoneAlert',
      'facilityAlert',
      'deviationAlert',
      'emergencyAlert'
    ];
    targets.forEach(id => {
      document.getElementById(id).checked = master.checked;
    });
  }
</script>

</body>
</html>
