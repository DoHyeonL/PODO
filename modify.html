<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>개인정보 수정</title>
  <style>
    body {
      background: linear-gradient(135deg, #98cebc5e, #ACB6E5);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
    }

    .edit-form {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
    }

    .form-title {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #333;
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 14px;
      margin-bottom: 8px;
      color: #333;
    }

    .input-field {
      height: 44px;
      padding: 0 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: white;
    }

    .withdraw {
      text-align: right;
      margin-bottom: 24px;
    }

    .withdraw a {
      font-size: 13px;
      color: #d9534f;
      text-decoration: none;
    }

    .button-group {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-cancel {
      background-color: #ccc;
      color: #333;
    }

    .btn-save {
      background-color: #6e67cf;
      color: white;
    }

    .btn-save:hover {
      background-color: #8cd875;
    }
  </style>
</head>
<body>

<form action="#" method="post" class="edit-form">
  <h2 class="form-title">개인정보 수정</h2>

  <div class="form-group">
    <label for="name">이름</label>
    <input type="text" id="name" name="name" class="input-field">
  </div>

  <div class="form-group">
    <label for="email">이메일</label>
    <input type="email" id="email" name="email" class="input-field">
  </div>

  <div class="form-group">
    <label for="address">주소</label>
    <input type="text" id="address" name="address" class="input-field">
  </div>

  <div class="form-group">
    <label for="password">비밀번호 변경</label>
    <input type="password" id="password" name="password" class="input-field" placeholder="새 비밀번호 입력">
  </div>
  
  <div class="form-group">
    <input type="password" id="password" name="password" class="input-field" placeholder="비밀번호 재입력">
  </div>



  <div class="withdraw">
    <a href="#">회원 탈퇴하기</a>
  </div>

  <div class="button-group">
    <button type="button" class="btn btn-cancel">이전으로</button>
    <button type="submit" class="btn btn-save">저장하기</button>
  </div>
</form>

</body>
</html>
