<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Dog Animation</title>
  <style>
    html, body {
        background: #ffefe500;
        width: 100%;
        height: 100vh; /* ← 여기를 100% 대신 100vh로 바꿔줘 */
        margin: 0;
        padding: 0;
        overflow: hidden; /* ✅ 스크롤 제거 */

    }

    body {
        display: flex;
        justify-content: center;
        align-items: center; /* ← 수직 중앙 정렬 */
        flex-direction: column;
    }

    *, *:before, *:after {
      box-sizing: border-box;
      position: relative;
    }

    .dog {
      width: 80px;
      height: 80px;
      z-index: 1;
      top: 20%;
    }

    /*.dog:before {
      content: '';
      display: block;
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      
      transform: translateY(-30%) scale(1.5);
    }*/

    .dog:before {
      content: '';
        display: block;
        position: absolute;
        width: 120%;   /* 너비를 넓혀서 그림자가 더 넓게 */
        height: 130%;  /* 높이를 넓혀서 그림자가 더 넓게 */
        border-radius: 50%;
        /*background: rgba(0, 0, 0, 0.1);  /* 배경을 더 어두운 색으로 */
        background: rgba(0, 0, 0, 0.08);
        transform: translateY(-40%) scale(1.6);
    }

    .dog * {
      position: absolute;
    }

    .dog-body,
    .dog-head,
    .dog-torso {
      border-radius: 50%;
      background: white;
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .dog-body {
      top: -50%;
      box-shadow: inset 0 -15px 0 0 #f1c3b8;
      animation: dog-body 200ms ease-in-out infinite alternate;
    }

    .dog-body:before {
      content: '';
      position: absolute;
      bottom: 90%;
      right: 50%;
      width: 90%;
      height: 90%;
      background: rgba(255, 255, 255, 0.4);
      border-top-left-radius: 100%;
      border-bottom-left-radius: 10%;
      border-top-right-radius: 10%;
      transform-origin: right bottom;
      animation: dog-tail-blur 33.333ms ease-in-out infinite alternate both;
    }

    @keyframes dog-tail-blur {
      0% { transform: rotate(0); opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; transform: rotate(90deg); }
    }

    @keyframes dog-body {
      from { transform: translateX(-10%); }
      to { transform: translateX(10%); }
    }

    .dog-head {
      animation: dog-head 1800ms cubic-bezier(0.11, 0.79, 0, 0.99) infinite;
    }

    @keyframes dog-head {
      0% { transform: rotate(45deg); }
      33% { transform: rotate(-45deg); }
      66% { transform: rotate(0deg); }
      100% { transform: rotate(45deg); }
    }

    .dog-torso {
      top: -20%;
      background: white;
      box-shadow: inset 0 -15px 0 0 #f1c3b8;
      animation: dog-torso 200ms ease-in-out infinite alternate-reverse;
    }

    @keyframes dog-torso {
      0% { transform: translateX(-5%); }
      100% { transform: translateX(5%); }
    }

    .dog-eyes {
      width: 60%;
      top: 55%;
      left: 20%;
      z-index: 1;
    }

    .dog-eyes:before {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      border-radius: 40px;
      background: pink;
      position: absolute;
      top: -10px;
      left: -10px;
      z-index: 0;
      border: 4px solid white;
      border-left-width: 0;
      border-bottom-width: 0;
      border-top-width: 0;
      transform: rotate(-45deg);
    }

    .dog-eye {
      width: 5px;
      height: 15px;
      border-radius: 50%;
      background: #000;
      z-index: 1;
    }

    .dog-eye:first-child {
      left: 0;
    }

    .dog-eye:last-child {
      right: 0;
    }

    .dog-muzzle {
      width: 60%;
      left: 20%;
      height: 50%;
      border-bottom-left-radius: 100%;
      border-bottom-right-radius: 100%;
      bottom: -15%;
      background: white;
    }

    .dog-muzzle:before {
      content: '';
      display: block;
      position: absolute;
      width: 6px;
      height: 20px;
      bottom: 0;
      background: #f1c3b8;
      left: calc(50% - 3px);
    }

    .dog-muzzle:after {
      content: '';
      display: block;
      position: absolute;
      background: black;
      width: 20px;
      height: 15px;
      bottom: 12px;
      left: calc(50% - 10px);
      border-bottom-left-radius: 60% 60%;
      border-bottom-right-radius: 60% 60%;
      border-top-left-radius: 50% 40%;
      border-top-right-radius: 50% 40%;
    }

    .dog-ears {
      width: 40%;
      top: 25%;
      left: 30%;
    }

    .dog-ear {
      bottom: -10px;
      height: 50px;
      width: 50px;
      background: #f1c3b8;
    }

    .dog-ear:first-child {
      right: 100%;
      border-bottom-left-radius: 80%;
      border-top-right-radius: 80%;
      box-shadow: inset -15px 15px 0 1px white;
      transform: rotate(10deg);
    }

    .dog-ear:last-child {
      left: 100%;
      border-bottom-right-radius: 80%;
      border-top-left-radius: 80%;
      box-shadow: inset 15px 15px 0 0 white;
      transform: rotate(-10deg);
    }

    .dog-tongue {
      width: 40%;
      height: 100%;
      left: calc(50% - 20px);
      z-index: -1;
      transform-origin: center top;
    }

    .dog-tongue:before {
      content: '';
      position: absolute;
      left: 8px;
      width: 100%;
      height: 100%;
      border-radius: 40px;
      background: #fd3163;
      animation: dog-tongue-inner 100ms ease-in-out infinite alternate;
    }

    @keyframes dog-tongue-inner {
      from { transform: translateY(5%); }
      to { transform: translateY(22%); }
    }

    .dog-tail {
      width: 22px;
      height: 24.2px;
      background: white;
      bottom: 40%;
      border-radius: 11px;
      left: calc(50% - 11px);
      transform-origin: center bottom;
    }

    .dog-tail .dog-tail {
      animation: dog-tail-segment 200ms ease-in-out infinite alternate;
    }

    @keyframes dog-tail-segment {
      0% { transform: rotate(-10deg); }
      100% { transform: rotate(10deg); }
    }

    .dog-body > .dog-tail {
      bottom: 90%;
    }
  </style>
</head>
<body>
  <div class="dog">
    <div class="dog-body">
      <div class="dog-tail">
        <div class="dog-tail">
          <div class="dog-tail">
            <div class="dog-tail">
              <div class="dog-tail">
                <div class="dog-tail">
                  <div class="dog-tail">
                    <div class="dog-tail"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="dog-torso"></div>
    <div class="dog-head">
      <div class="dog-ears">
        <div class="dog-ear"></div>
        <div class="dog-ear"></div>
      </div>
      <div class="dog-eyes">
        <div class="dog-eye"></div>
        <div class="dog-eye"></div>
      </div>
      <div class="dog-muzzle">
        <div class="dog-tongue"></div>
      </div>
    </div>
  </div>
</body>
</html>
