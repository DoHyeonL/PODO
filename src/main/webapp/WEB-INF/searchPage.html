<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>경로 검색 페이지</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=qjdtka4as3"></script>

    <style>
        #map{
            width: 100%;
            height: 100vh;
        }

        #background{
            position: fixed;
            top: 0px;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.801);
        }

        .position{
            position: fixed;
        }

        .textBtn{
            all: unset;
        }

    </style>


</head>
<body>
    <div id="map" ></div>

    <script>
        var mapOptions = {
            center: new naver.maps.LatLng(35.150469, 126.858843),
            zoom: 16
        };

        var map = new naver.maps.Map('map', mapOptions);

    </script>

    <div id="background">
        <form  id="inputText" method="post" action="#" >
            <input type="text" name="text" placeholder="주소를 입력하세요"
            style="border: none; background: transparent; margin-left: 35px; 
            margin-top: 10px; height: 40px; width: 100%; font-size: large;">
        </form>
    </div>

    <hr class="position" style="width: 100%; top:45px;" >

    <button class="text-button">
        <span class="position" style="font-weight: bold; top: 70px; margin-left: 10px;
                        font-size: 14px;">
            최근검색
        </span>
    </button>

</body>
</html>
